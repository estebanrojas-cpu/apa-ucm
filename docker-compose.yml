services:

  # ─── Aplicación Laravel (PHP-FPM) ───────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        user: appuser
        uid: 1000
    image: apa-ucm-app
    container_name: apa_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./src:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/local.ini
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-apa_ucm}
      - DB_USERNAME=${DB_USERNAME:-apa_user}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    networks:
      - apa_network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      mailpit:
        condition: service_started

  # ─── Nginx ──────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: apa_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - apa_network
    depends_on:
      - app

  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: apa_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-apa_ucm}
      POSTGRES_USER: ${DB_USERNAME:-apa_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - apa_pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - apa_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-apa_user} -d ${DB_DATABASE:-apa_ucm}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Redis (colas y caché) ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: apa_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - apa_network

  # ─── Vite Dev Server (HMR) ──────────────────────────────────────────────────
  vite:
    image: apa-ucm-app
    container_name: apa_vite
    restart: unless-stopped
    working_dir: /var/www
    command: npm run dev
    ports:
      - "5173:5173"
    volumes:
      - ./src:/var/www
    networks:
      - apa_network
    depends_on:
      - app

  # ─── Mailpit (captura de correos en desarrollo) ─────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    container_name: apa_mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"   # UI web para revisar correos
      - "1025:1025"   # SMTP
    networks:
      - apa_network

  # ─── Queue Worker (Laravel) ─────────────────────────────────────────────────
  queue:
    image: apa-ucm-app
    container_name: apa_queue
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    volumes:
      - ./src:/var/www
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-apa_ucm}
      - DB_USERNAME=${DB_USERNAME:-apa_user}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    networks:
      - apa_network
    depends_on:
      - app
      - redis

volumes:
  apa_pgdata:
    driver: local

networks:
  apa_network:
    driver: bridge
